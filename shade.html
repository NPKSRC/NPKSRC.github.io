<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>会话花园 · Conversation Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5efe3; --paper-2:#fbf8f0; --card:#fffdf8;
  --ink:#2b3a31; --ink-soft:#6c7c71; --ink-faint:#9aa89e;
  --jade:#2f8f6b; --jade-deep:#1f6a4e; --jade-wash:#e7f1ea;
  --coral:#e07a5f; --coral-deep:#c45c41; --coral-wash:#fbeae3;
  --amber:#e2a03a; --amber-wash:#f8eed6;
  --line:rgba(47,143,107,.16); --line-2:rgba(43,58,49,.10);
  --shadow:0 1px 2px rgba(43,58,49,.05),0 10px 30px -18px rgba(31,106,78,.35);
  --r:18px; --maxw:680px;
  --serif:"Noto Serif SC",Georgia,serif;
  --sans:"Outfit","Noto Sans SC",system-ui,sans-serif;
  --han:"Noto Sans SC","Outfit",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);color:var(--ink);
  background:
    radial-gradient(1200px 600px at 50% -10%,#eef6ef 0%,transparent 60%),
    var(--paper);
  -webkit-font-smoothing:antialiased;line-height:1.55;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.han{font-family:var(--han)}
.hide{display:none!important}

/* ---------- gate ---------- */
#gate{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:28px}
.gate-card{width:100%;max-width:380px;text-align:center}
.gate-art{width:120px;height:120px;margin:0 auto 22px;display:block}
.gate-card h1{font-size:1.5rem;font-weight:600;margin:0 0 4px;letter-spacing:.01em}
.gate-card .sub{color:var(--ink-soft);font-size:.92rem;margin:0 0 26px}
.gate-card .sub .han{font-weight:500}
.field{position:relative;margin-bottom:14px}
.field input{
  width:100%;padding:15px 16px;border-radius:14px;border:1.5px solid var(--line);
  background:var(--card);font-size:1.05rem;color:var(--ink);outline:none;text-align:center;
  transition:border-color .15s,box-shadow .15s;
}
.field input:focus{border-color:var(--jade);box-shadow:0 0 0 4px var(--jade-wash)}
.gate-btn{
  width:100%;padding:15px;border-radius:14px;font-size:1rem;font-weight:600;
  color:#fff;background:linear-gradient(135deg,var(--jade),var(--jade-deep));
  box-shadow:var(--shadow);transition:transform .1s,filter .15s;
}
.gate-btn:active{transform:translateY(1px)}
.gate-btn:disabled{filter:saturate(.4) opacity(.7);cursor:default}
.remember{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0 4px;color:var(--ink-soft);font-size:.85rem}
.remember input{width:16px;height:16px;accent-color:var(--jade)}
.gate-err{color:var(--coral-deep);font-size:.85rem;height:1.2em;margin-top:10px;opacity:0;transition:opacity .2s}
.gate-err.show{opacity:1}
.gate-foot{margin-top:34px;color:var(--ink-faint);font-size:.74rem;line-height:1.6}

/* ---------- app shell ---------- */
#app{max-width:var(--maxw);margin:0 auto;padding:0 16px 110px}
.topbar{
  position:sticky;top:0;z-index:20;margin:0 -16px 0;padding:14px 16px 12px;
  background:linear-gradient(var(--paper) 72%,transparent);
  backdrop-filter:blur(4px);
}
.topbar .row{display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:1.06rem}
.brand svg{width:26px;height:26px;flex:none}
.brand small{font-weight:400;color:var(--ink-soft);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}
.spacer{flex:1}
.lock-btn{font-size:.8rem;color:var(--ink-soft);padding:7px 11px;border-radius:999px;border:1px solid var(--line)}
.lock-btn:active{background:var(--jade-wash)}

/* search + filters */
.controls{margin-top:12px}
.search{position:relative}
.search input{
  width:100%;padding:11px 14px 11px 40px;border-radius:13px;border:1.5px solid var(--line);
  background:var(--card);font-size:.95rem;color:var(--ink);outline:none;
}
.search input:focus{border-color:var(--jade)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--ink-faint)}
.chips{display:flex;gap:7px;overflow-x:auto;padding:11px 0 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:7px 13px;border-radius:999px;font-size:.82rem;font-weight:500;
  color:var(--ink-soft);background:var(--card);border:1px solid var(--line);white-space:nowrap;
  transition:all .12s;
}
.chip[data-on="1"]{color:#fff;border-color:transparent;background:var(--jade)}
.chip.me[data-on="1"]{background:var(--coral)}
.chip.life[data-on="1"]{background:var(--amber)}

/* ---------- diary / vine timeline ---------- */
.month-head{
  display:flex;align-items:baseline;gap:10px;margin:26px 2px 6px;
}
.month-head .m{font-size:1.18rem;font-weight:600}
.month-head .y{color:var(--ink-faint);font-size:.8rem;letter-spacing:.06em}
.month-head .ct{margin-left:auto;color:var(--ink-faint);font-size:.74rem}

.vine{position:relative;padding-left:30px}
.vine::before{
  content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(var(--jade) 0%,#bcd9c8 100%);border-radius:2px;opacity:.5;
}
.entry{position:relative;margin:0 0 16px}
.node{
  position:absolute;left:-26px;top:18px;width:13px;height:13px;border-radius:50%;
  background:var(--jade);border:2.5px solid var(--paper-2);box-shadow:0 0 0 1px var(--line);
}
.entry.me .node{background:var(--coral)}
.entry.life .node{background:var(--amber)}
.card{
  background:var(--card);border:1px solid var(--line-2);border-radius:var(--r);
  padding:15px 16px;box-shadow:var(--shadow);
}
.entry.me .card{background:linear-gradient(180deg,#fff8f4,#fffdfb)}
.card .head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.who{font-size:.74rem;font-weight:600;padding:3px 9px;border-radius:999px}
.who.aya{color:var(--jade-deep);background:var(--jade-wash)}
.who.me{color:var(--coral-deep);background:var(--coral-wash)}
.who.other{color:var(--ink-soft);background:#eee}
.tag{font-size:.68rem;color:var(--ink-faint);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
.when{margin-left:auto;font-size:.73rem;color:var(--ink-faint)}
.subj{font-weight:600;font-size:.96rem;margin:1px 0 7px;letter-spacing:.005em}
.body{
  font-family:var(--serif);font-size:.97rem;line-height:1.72;color:#33433a;
  white-space:pre-wrap;word-break:break-word;
}
.body.clamp{max-height:7.4em;overflow:hidden;-webkit-mask-image:linear-gradient(#000 60%,transparent)}
.more{margin-top:8px;font-size:.8rem;color:var(--jade-deep);font-weight:600}
.entry.me .more{color:var(--coral-deep)}
.drive{
  display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-size:.8rem;font-weight:600;
  color:var(--jade-deep);background:var(--jade-wash);padding:7px 12px;border-radius:10px;text-decoration:none;
}
.drive svg{width:14px;height:14px}
.foot-note{text-align:center;color:var(--ink-faint);font-size:.78rem;margin:30px 0 0;line-height:1.7}

/* ---------- review garden ---------- */
.view-head{margin:18px 2px 4px}
.view-head h2{font-size:1.32rem;font-weight:600;margin:0}
.view-head p{color:var(--ink-soft);font-size:.86rem;margin:4px 0 0}
.seg{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:5px;margin:16px 0}
.seg button{flex:1;padding:9px 6px;border-radius:9px;font-size:.83rem;font-weight:600;color:var(--ink-soft);transition:all .12s}
.seg button[data-on="1"]{background:var(--jade);color:#fff;box-shadow:var(--shadow)}

.rev-stage{min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px}
.flash{
  width:100%;background:var(--card);border:1px solid var(--line-2);border-radius:22px;
  box-shadow:var(--shadow);padding:30px 24px;min-height:230px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;position:relative;
}
.flash .src-pill{position:absolute;top:14px;left:14px;font-size:.7rem;color:var(--ink-faint);
  border:1px solid var(--line);padding:3px 8px;border-radius:999px}
.flash .sentence{font-family:var(--serif);font-size:1.55rem;line-height:1.7;color:var(--ink);font-weight:500}
.flash .hint{color:var(--ink-faint);font-size:.82rem}
.reveal{width:100%;border-top:1px dashed var(--line);margin-top:6px;padding-top:14px;text-align:left}
.reveal .meta{font-size:.8rem;color:var(--ink-soft);margin-bottom:10px}
.reveal .meta b{color:var(--jade-deep)}
.reveal .meta.me b{color:var(--coral-deep)}
.note-in{width:100%;padding:10px 12px;border-radius:11px;border:1.5px solid var(--line);
  background:var(--paper-2);font-family:var(--han);font-size:.9rem;resize:vertical;min-height:44px;outline:none}
.note-in:focus{border-color:var(--jade)}
.rate{display:flex;gap:8px;width:100%}
.rate button{flex:1;padding:13px 6px;border-radius:13px;font-weight:600;font-size:.86rem;border:1.5px solid var(--line);background:var(--card);transition:transform .1s}
.rate button:active{transform:translateY(1px)}
.rate .forgot{color:var(--coral-deep);border-color:var(--coral-wash);background:var(--coral-wash)}
.rate .fuzzy{color:var(--amber);border-color:var(--amber-wash);background:var(--amber-wash)}
.rate .got{color:var(--jade-deep);border-color:var(--jade-wash);background:var(--jade-wash)}
.flip-btn{width:100%;padding:14px;border-radius:14px;font-weight:600;color:#fff;
  background:linear-gradient(135deg,var(--jade),var(--jade-deep));box-shadow:var(--shadow)}
.star-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 16px;border-radius:13px;
  font-weight:600;font-size:.88rem;color:var(--amber);background:var(--amber-wash);border:1.5px solid transparent}
.star-btn.on{color:#fff;background:var(--amber)}
.skip{color:var(--ink-soft);font-size:.84rem;padding:8px 14px}
.empty-rev{color:var(--ink-soft);font-size:.92rem;line-height:1.7;max-width:300px}
.empty-rev svg{width:88px;height:88px;margin-bottom:6px}
.prog{display:flex;align-items:center;gap:10px;width:100%;margin-bottom:4px}
.prog .bar{flex:1;height:7px;border-radius:99px;background:var(--jade-wash);overflow:hidden}
.prog .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--jade),var(--amber));width:0;transition:width .35s}
.prog .lbl{font-size:.74rem;color:var(--ink-faint);white-space:nowrap}

/* ---------- garden / stats ---------- */
.gstats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:16px 0}
.stat{background:var(--card);border:1px solid var(--line-2);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow)}
.stat .n{font-size:1.7rem;font-weight:700;line-height:1;font-family:var(--sans)}
.stat .l{font-size:.78rem;color:var(--ink-soft);margin-top:5px}
.stat.jade .n{color:var(--jade-deep)} .stat.coral .n{color:var(--coral-deep)}
.stat.amber .n{color:var(--amber)} .stat.streak .n{color:var(--coral)}
.gplot{background:linear-gradient(180deg,#eef6ef,#fbf8f0);border:1px solid var(--line);border-radius:20px;
  padding:18px 16px 8px;margin:18px 0;box-shadow:var(--shadow);text-align:center}
.gplot h3{margin:0 0 2px;font-size:1rem;font-weight:600}
.gplot p{margin:0 0 10px;font-size:.8rem;color:var(--ink-soft)}
.flowers{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:flex-end;min-height:64px}
.flowers .fl{font-size:1.5rem;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.08))}
.flowers .fl.dim{opacity:.18;filter:grayscale(1)}
.milestones{margin-top:10px;text-align:left}
.ms{display:flex;align-items:center;gap:10px;padding:9px 4px;border-top:1px solid var(--line-2);font-size:.86rem}
.ms .ic{font-size:1.15rem}
.ms .txt{flex:1}
.ms .txt b{font-weight:600}
.ms .st{font-size:.74rem;color:var(--ink-faint)}
.ms.done .st{color:var(--jade-deep);font-weight:600}

/* ---------- bottom nav ---------- */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  display:flex;justify-content:center;gap:4px;
  padding:7px 8px calc(7px + env(safe-area-inset-bottom));
  background:linear-gradient(transparent,var(--paper-2) 26%);
}
.nav-inner{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);
  border-radius:999px;padding:5px;box-shadow:0 8px 26px -12px rgba(31,106,78,.5)}
.nav button{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 20px;border-radius:999px;color:var(--ink-soft);font-size:.68rem;font-weight:600}
.nav button svg{width:21px;height:21px}
.nav button[data-on="1"]{color:var(--jade-deep);background:var(--jade-wash)}
.nav button .han{font-size:.72rem}

@media (min-width:540px){ .gstats{grid-template-columns:repeat(4,1fr)} }
@media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
.bloom{animation:bloom .5s ease}
@keyframes bloom{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- ============ GATE ============ -->
<section id="gate">
  <div class="gate-card">
    <svg class="gate-art" viewBox="0 0 120 120" fill="none" aria-hidden="true">
      <ellipse cx="60" cy="104" rx="40" ry="7" fill="#1f6a4e" opacity=".12"/>
      <!-- pot -->
      <path d="M38 70h44l-5 28a6 6 0 0 1-6 5H49a6 6 0 0 1-6-5z" fill="#e07a5f"/>
      <rect x="34" y="62" width="52" height="12" rx="4" fill="#c45c41"/>
      <!-- stem + leaves -->
      <path d="M60 62V36" stroke="#2f8f6b" stroke-width="3" stroke-linecap="round"/>
      <path d="M60 50c-10-2-16-9-16-9s10-4 16 3" fill="#2f8f6b"/>
      <path d="M60 44c9-3 15-10 15-10s-9-4-15 3" fill="#1f6a4e"/>
      <!-- bloom -->
      <circle cx="60" cy="30" r="9" fill="#e2a03a"/>
      <circle cx="60" cy="30" r="4" fill="#fff8f0"/>
      <!-- two little sleeping cats -->
      <path d="M30 92c0-5 5-8 10-8s10 3 10 8c0 3-2 4-5 4H35c-3 0-5-1-5-4z" fill="#e8a06f"/>
      <circle cx="32" cy="86" r="1.6" fill="#5b3a26"/>
      <path d="M70 93c0-4 4-7 9-7s9 3 9 7c0 3-2 4-4 4H74c-2 0-4-1-4-4z" fill="#caa07a"/>
      <circle cx="86" cy="88" r="1.5" fill="#5b3a26"/>
    </svg>
    <h1 class="han">会话花园</h1>
    <p class="sub">A private garden of <span class="han">·</span> <b>conversations & lessons</b></p>
    <form id="gate-form" autocomplete="off">
      <div class="field">
        <input id="pass" type="password" inputmode="text" placeholder="passphrase" autocomplete="off" spellcheck="false">
      </div>
      <button class="gate-btn" id="gate-go" type="submit">开门 · Enter</button>
      <label class="remember"><input type="checkbox" id="remember"> 记住这台设备 · stay unlocked here</label>
      <div class="gate-err" id="gate-err">That passphrase didn’t open the gate.</div>
    </form>
    <p class="gate-foot">Just for you. Nothing leaves this device.</p>
  </div>
</section>

<!-- ============ APP ============ -->
<main id="app" class="hide">
  <div class="topbar">
    <div class="row">
      <div class="brand">
        <svg viewBox="0 0 32 32" fill="none"><path d="M16 28V12" stroke="#2f8f6b" stroke-width="2.4" stroke-linecap="round"/><path d="M16 19c-7-1-11-7-11-7s7-3 11 2" fill="#2f8f6b"/><path d="M16 15c6-2 10-7 10-7s-6-3-10 2" fill="#1f6a4e"/><circle cx="16" cy="8" r="5" fill="#e2a03a"/><circle cx="16" cy="8" r="2" fill="#fff8f0"/></svg>
        <div><span class="han">会话花园</span><br><small>Conversation Garden</small></div>
      </div>
      <div class="spacer"></div>
      <button class="lock-btn" id="lock">🔒 锁上</button>
    </div>
    <div class="controls" id="diary-controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="q" class="han" placeholder="搜索日记… search your diary">
      </div>
      <div class="chips" id="chips">
        <button class="chip" data-f="all" data-on="1">全部 All</button>
        <button class="chip me" data-f="me" data-on="0">我 Me</button>
        <button class="chip" data-f="aya" data-on="0">老师 Aya</button>
        <button class="chip life" data-f="life" data-on="0">生活 Life</button>
        <button class="chip" data-f="lesson" data-on="0">课程 Lessons</button>
      </div>
    </div>
  </div>

  <section id="view-diary"></section>
  <section id="view-review" class="hide"></section>
  <section id="view-garden" class="hide"></section>
</main>

<!-- ============ NAV ============ -->
<nav class="nav hide" id="nav">
  <div class="nav-inner">
    <button data-v="diary" data-on="1"><svg viewBox="0 0 24 24" fill="none"><path d="M5 4h11l3 3v13H5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 9h6M9 13h6M9 17h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span class="han">日记</span></button>
    <button data-v="review"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span class="han">复习</span></button>
    <button data-v="garden"><svg viewBox="0 0 24 24" fill="none"><path d="M12 20v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 14c-4 0-6-3-6-3s4-2 6 1c2-3 6-1 6-1s-2 3-6 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="7" r="3" stroke="currentColor" stroke-width="2"/></svg><span class="han">花园</span></button>
  </div>

const LS = "naniwa_diary_v1";
const PASS_LS = "naniwa_diary_pass";
const WD = ["日","一","二","三","四","五","六"];
let DB = null, S = null;

/* ---------- crypto-lite (XOR + sha256 key) ---------- */
async function keyBytes(pass){
  const h = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
  return new Uint8Array(h);
}
async function decrypt(b64, pass){
  const key = await keyBytes(pass);
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i) ^ key[i % key.length];
  return new TextDecoder("utf-8").decode(bytes);
}

/* ---------- local state ---------- */
function load(){ try{ return JSON.parse(localStorage.getItem(LS)) || {}; }catch(e){ return {}; } }
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }
function initState(){
  S = Object.assign({deck:{}, streak:{count:0,last:null}, reviews:0}, load());
}

/* ---------- boot ---------- */
async function unlock(pass, remember){
  let json;
  try{ json = await decrypt(DATA_BLOB, pass); DB = JSON.parse(json); }
  catch(e){ return false; }
  if(!DB || !DB.entries) return false;
  if(remember) localStorage.setItem(PASS_LS, pass);
  initState();
  document.getElementById("gate").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  document.getElementById("nav").classList.remove("hide");
  renderDiary(); 
  return true;
}
document.getElementById("gate-form").addEventListener("submit", async e=>{
  e.preventDefault();
  const btn = document.getElementById("gate-go");
  const err = document.getElementById("gate-err");

});

/* ---------- helpers ---------- */
const fmtDate = iso=>{
  const d = new Date(iso);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${WD[d.getDay()]}`;
};
const monthKey = iso=>iso.slice(0,7);
const monthLabel = k=>{ const [y,m]=k.split("-"); return {m:`${+m}月`, y:`${y}`}; };
const esc = s=>s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const senderName = s=> s==="me" ? "我 · Aey" : s==="aya" ? "王老师 · Aya" : "—";

/* ===================== DIARY ===================== */
let filter = {f:"all", q:""};
function entriesFiltered(){
  let es = DB.entries.slice().reverse(); // newest first
  if(filter.f==="me")   es = es.filter(e=>e.sender==="me");
  if(filter.f==="aya")  es = es.filter(e=>e.sender==="aya");
  if(filter.f==="life") es = es.filter(e=>e.type==="life");
  if(filter.f==="lesson") es = es.filter(e=>e.type==="lesson");
  if(filter.q){
    const q = filter.q.toLowerCase();
    es = es.filter(e=>(e.body+e.subject).toLowerCase().includes(q));
  }
  return es;
}
function renderDiary(){
  const es = entriesFiltered();
  const root = document.getElementById("view-diary");
  if(!es.length){ root.innerHTML = `<p class="foot-note" style="margin-top:60px">没有找到 · nothing matches “${esc(filter.q)}”.</p>`; return; }
  let html = "", curMonth = "";
  const counts = {};
  es.forEach(e=>counts[monthKey(e.dt)]=(counts[monthKey(e.dt)]||0)+1);
  es.forEach((e,i)=>{
    const mk = monthKey(e.dt);
    if(mk!==curMonth){
      if(curMonth) html += `</div>`;
      const ml = monthLabel(mk);
      html += `<div class="month-head"><span class="m han">${ml.m}</span><span class="y">${ml.y}</span><span class="ct">${counts[mk]} 篇</span></div><div class="vine">`;
      curMonth = mk;
    }
    html += entryHTML(e, i);
  });
  html += `</div>`;
  html += `<p class="foot-note">从 ${DB.meta.first} 开始的会话花园<br>${DB.meta.entries} 篇 · 还在生长中 🌱</p>`;
  root.innerHTML = html;
}
function entryHTML(e, i){
  const cls = e.sender==="me" ? "me" : (e.type==="life" ? "life":"");
  const whoCls = e.sender==="me"?"me":(e.sender==="aya"?"aya":"other");
  const long = e.body.length > 220;
  const drive = e.drive ? `<a class="drive" href="${e.drive}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none"><path d="M9 17H7A4 4 0 0 1 7 9h.3A5 5 0 0 1 17 10a3.5 3.5 0 0 1 0 7h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>课堂资料 · Lesson PDF</a>`:"";
  const tag = e.type==="lesson" ? `<span class="tag">课程</span>` : `<span class="tag">生活</span>`;
  return `<div class="entry ${cls}">
    <span class="node"></span>
    <div class="card">
      <div class="head">
        <span class="who ${whoCls}">${senderName(e.sender)}</span>${tag}
        <span class="when">${fmtDate(e.dt)}</span>
      </div>
      ${e.subject?`<div class="subj han">${esc(e.subject)}</div>`:""}
      <div class="body ${long?"clamp":""}" id="b${i}">${esc(e.body)}</div>
      ${long?`<div class="more" onclick="expand(${i})">展开 · read more ↓</div>`:""}
      ${drive}
    </div>
  </div>`;
}
window.expand = i=>{
  const b = document.getElementById("b"+i);
  b.classList.remove("clamp");
  b.nextElementSibling && b.nextElementSibling.classList.contains("more") && b.nextElementSibling.remove();
};
document.getElementById("q").addEventListener("input", e=>{ filter.q=e.target.value.trim(); renderDiary(); });
document.getElementById("chips").addEventListener("click", e=>{
  const b = e.target.closest(".chip"); if(!b) return;
  document.querySelectorAll("#chips .chip").forEach(c=>c.dataset.on="0");
  b.dataset.on="1"; filter.f=b.dataset.f; renderDiary();
  document.getElementById("view-diary").scrollIntoView({behavior:"smooth",block:"start"});
});

/* ===================== REVIEW GARDEN ===================== */
const DAILY_GOAL = 10;
let revMode = "due", revQueue = [], revCard = null, revFlipped = false, revDoneToday = 0;
const todayStr = ()=> new Date().toISOString().slice(0,10);
const BOX_DAYS = [0,1,2,4,8,16];

function allSentences(){ // [{s, dt, sender, subject}]
  const out = [];
  DB.entries.forEach(e=> e.sents.forEach(s=> out.push({s, dt:e.dt, sender:e.sender, subject:e.subject})));
  return out;
}
function dueDeck(){
  const t = todayStr();
  return Object.values(S.deck).filter(c=> (c.due||t) <= t);
}
function bumpStreak(){
  const t = todayStr();
  if(S.streak.last === t) return;
  const y = new Date(Date.now()-864e5).toISOString().slice(0,10);
  S.streak.count = (S.streak.last === y) ? S.streak.count+1 : 1;
  S.streak.last = t; save();
}
function pickQueue(){
  if(revMode==="due") revQueue = dueDeck().sort((a,b)=>(a.due||"").localeCompare(b.due||""));
  else if(revMode==="discover"){
    const pool = allSentences().filter(o=> !S.deck[o.s]);
    revQueue = shuffle(pool).slice(0,40);
  } else if(revMode==="ago"){
    revQueue = aYearAgo();
  }
  revDoneToday = 0; nextCard();
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function aYearAgo(){
  const now = new Date(), out = [];
  const dayOfYearNow = Math.floor((now - new Date(now.getFullYear(),0,0))/864e5);
  DB.entries.forEach(e=>{
    const d = new Date(e.dt);
    const dayOfYear = Math.floor((d - new Date(d.getFullYear(),0,0))/864e5);
    if(d.getFullYear() < now.getFullYear() && Math.abs(dayOfYear - dayOfYearNow) <= 6) out.push(e);
  });
  return out.reverse();
}
function nextCard(){
  revFlipped = false;
  revCard = revQueue.shift() || null;
  renderReview();
}
function rate(delta){
  if(revMode==="ago"){ nextCard(); return; }
  const s = revCard.s;
  let c = S.deck[s];
  if(!c){ c = S.deck[s] = {s, box:1, note:"", src:{dt:revCard.dt,sender:revCard.sender,subject:revCard.subject}, added:todayStr()}; }
  c.box = Math.max(1, Math.min(5, (c.box||1)+delta));
  const days = BOX_DAYS[c.box];
  c.due = new Date(Date.now()+days*864e5).toISOString().slice(0,10);
  const note = document.getElementById("note-in");
  if(note) c.note = note.value;
  S.reviews++; revDoneToday++;
  if(revDoneToday>=DAILY_GOAL) bumpStreak();
  save(); nextCard();
}
function toggleStar(){
  const s = revCard.s;
  if(S.deck[s]){ delete S.deck[s]; }
  else {
    const note = document.getElementById("note-in");
    S.deck[s] = {s, box:1, due:todayStr(), note:note?note.value:"", src:{dt:revCard.dt,sender:revCard.sender,subject:revCard.subject}, added:todayStr()};
  }
  save(); renderReview();
}
function renderReview(){
  const root = document.getElementById("view-review");
  const deckN = Object.keys(S.deck).length, dueN = dueDeck().length;
  let stage = "";
  if(!revCard){
    stage = emptyStage();
  } else if(revMode==="ago"){
    const e = revCard;
    stage = `<div class="flash">
        <span class="src-pill">${fmtDate(e.dt)}</span>
        <div class="sentence" style="font-size:1.15rem;font-weight:400;text-align:left;white-space:pre-wrap">${esc(e.body.slice(0,260))}${e.body.length>260?"…":""}</div>
      </div>
      <div style="display:flex;gap:8px;width:100%">
        <button class="skip" style="flex:1;border:1.5px solid var(--line);border-radius:13px" onclick="nextCard()">下一个 · next →</button>
      </div>`;
  } else {
    const starred = !!S.deck[revCard.s];
    stage = `<div class="prog"><div class="bar"><i style="width:${Math.min(100,revDoneToday/DAILY_GOAL*100)}%"></i></div><span class="lbl">今天 ${revDoneToday}/${DAILY_GOAL} 🌱</span></div>
      <div class="flash">
        <span class="src-pill">${revMode==="due"?"我的卡片":"发现"}</span>
        <div class="sentence han">${esc(revCard.s)}</div>
        ${!revFlipped?`<div class="hint">想一想意思… tap to reveal</div>`:`
          <div class="reveal">
            <div class="meta ${revCard.sender}">出自 <b>${senderName(revCard.sender)}</b> · ${fmtDate(revCard.dt)}<br><span style="color:var(--ink-faint)">「${esc(revCard.subject||"")}」</span></div>
            <textarea id="note-in" class="note-in" placeholder="你的笔记 / 拼音 / 意思…">${esc((S.deck[revCard.s]&&S.deck[revCard.s].note)||"")}</textarea>
          </div>`}
      </div>`;
    if(!revFlipped){
      stage += `<button class="flip-btn" onclick="flip()">看看 · reveal</button>
        <button class="skip" onclick="nextCard()">跳过 skip</button>`;
    } else if(revMode==="discover"){
      stage += `<button class="star-btn ${starred?"on":""}" onclick="toggleStar()">${starred?"★ 已收藏 saved":"☆ 收藏到卡片 save"}</button>
        <button class="skip" onclick="nextCard()">下一个 next →</button>`;
    } else {
      stage += `<div class="rate">
          <button class="forgot" onclick="rate(-1)">忘了</button>
          <button class="fuzzy" onclick="rate(0)">模糊</button>
          <button class="got" onclick="rate(1)">记得</button>
        </div>`;
    }
  }
  root.innerHTML = `
    <div class="view-head"><h2 class="han">复习花园</h2><p>Real sentences from your lessons & letters. Water them to remember.</p></div>
    <div class="seg" id="rev-seg">
      <button data-m="due"  data-on="${revMode==="due"?1:0}">我的卡片 ${dueN?`· ${dueN}`:""}</button>
      <button data-m="discover" data-on="${revMode==="discover"?1:0}">发现 Discover</button>
      <button data-m="ago"  data-on="${revMode==="ago"?1:0}">去年这周</button>
    </div>
    <div class="rev-stage">${stage}</div>`;
  document.getElementById("rev-seg").addEventListener("click", e=>{
    const b=e.target.closest("button"); if(!b)return;
    revMode=b.dataset.m; pickQueue();
  });
}
function emptyStage(){
  if(revMode==="due"){
    const deckN = Object.keys(S.deck).length;
    return `<div class="empty-rev">
      <svg viewBox="0 0 120 120" fill="none"><ellipse cx="60" cy="104" rx="34" ry="6" fill="#1f6a4e" opacity=".12"/><path d="M60 100V60" stroke="#2f8f6b" stroke-width="3" stroke-linecap="round"/><path d="M60 78c-12-2-19-11-19-11s12-5 19 4" fill="#2f8f6b"/><path d="M60 70c11-3 18-12 18-12s-11-5-18 4" fill="#1f6a4e"/><circle cx="60" cy="52" r="11" fill="#e2a03a"/><circle cx="60" cy="52" r="5" fill="#fff8f0"/></svg>
      <div>${deckN? "都复习完啦，今天的花园浇好水了 🌼<br>All caught up for today." : "你的卡片花园还是空的。<br>Go to <b>发现 Discover</b> and save the sentences you want to keep."}</div>
      </div>`;
  }
  if(revMode==="ago") return `<div class="empty-rev"><div>还没有一年前的这一周。<br>No entries from a year ago this week — yet. It'll fill in as the garden grows. 🌱</div></div>`;
  return `<div class="empty-rev"><div>没有更多句子了。<br>You've gone through the pool.</div></div>`;
}
window.flip = ()=>{ revFlipped = true; renderReview(); };
window.nextCard = nextCard;
window.rate = rate; window.toggleStar = toggleStar;

/* ===================== GARDEN / STATS ===================== */
function renderGarden(){
  const root = document.getElementById("view-garden");
  const m = DB.meta;
  const weeks = Math.max(1, Math.round((new Date(m.last)-new Date(m.first))/6048e5));
  const deckN = Object.keys(S.deck).length;
  const mastered = Object.values(S.deck).filter(c=>c.box>=5).length;
  const ms = [
    {ic:"🌱", t:"种下花园", d:"First lesson saved", goal:1, val:m.entries},
    {ic:"🌿", t:"一年的对话", d:"A year of conversations", goal:52, val:weeks},
    {ic:"🌼", t:"收藏 25 句", d:"Save 25 sentences", goal:25, val:deckN},
    {ic:"🌳", t:"掌握 25 句", d:"Master 25 sentences", goal:25, val:mastered},
    {ic:"🔥", t:"连续 7 天", d:"7-day streak", goal:7, val:S.streak.count},
  ];
  const bloomN = ms.filter(x=>x.val>=x.goal).length;
  const flowers = ["🌷","🌻","🌼","🌸","🪻","🌹","💐","🏵️"];
  let fl = "";
  for(let i=0;i<8;i++) fl += `<span class="fl ${i<Math.min(8, Math.ceil(weeks/14))?"":"dim"}">${flowers[i]}</span>`;
  root.innerHTML = `
    <div class="view-head"><h2 class="han">我的花园</h2><p>Two years, growing one Saturday at a time.</p></div>
    <div class="gstats">
      <div class="stat jade"><div class="n">${m.lessons}</div><div class="l">课程 lessons</div></div>
      <div class="stat coral"><div class="n">${weeks}</div><div class="l">周 weeks together</div></div>
      <div class="stat amber"><div class="n">${deckN}</div><div class="l">收藏的句子 saved</div></div>
      <div class="stat streak"><div class="n">${S.streak.count}🔥</div><div class="l">连续天数 streak</div></div>
    </div>
    <div class="gplot">
      <h3 class="han">会话花园</h3>
      <p>${m.first} → ${m.last} · still blooming</p>
      <div class="flowers">${fl}</div>
    </div>
    <div class="gplot" style="text-align:left">
      <h3 class="han" style="text-align:center">里程碑 · Milestones</h3>
      <p style="text-align:center">${bloomN}/${ms.length} bloomed</p>
      <div class="milestones">
        ${ms.map(x=>{const done=x.val>=x.goal;return `<div class="ms ${done?"done":""}"><span class="ic">${done?x.ic:"🪴"}</span><span class="txt"><b>${x.t}</b><br><span class="st">${esc(x.d)}</span></span><span class="st">${Math.min(x.val,x.goal)}/${x.goal}${done?" ✓":""}</span></div>`;}).join("")}
      </div>
    </div>
    <p class="foot-note">总共 ${m.entries} 篇 · ${m.sentences} 个句子在等你 🌿<br>Reviewed ${S.reviews} times.</p>`;
}

/* ===================== NAV ===================== */
document.getElementById("nav").addEventListener("click", e=>{
  const b = e.target.closest("button[data-v]"); if(!b) return;
  document.querySelectorAll("#nav button").forEach(x=>x.dataset.on="0");
  b.dataset.on="1";
  const v = b.dataset.v;
  document.getElementById("diary-controls").classList.toggle("hide", v!=="diary");
  ["diary","review","garden"].forEach(name=>{
    document.getElementById("view-"+name).classList.toggle("hide", name!==v);
  });
  if(v==="review"){ pickQueue(); }
  if(v==="garden"){ renderGarden(); }
  window.scrollTo({top:0,behavior:"smooth"});
});

/* ---------- auto-unlock if remembered ---------- */
(async()=>{
  const saved = localStorage.getItem(PASS_LS);
  if(saved){ const ok = await unlock(saved, true); if(!ok) localStorage.removeItem(PASS_LS); }
  document.getElementById("pass").focus();
})();
</script>
